# schema.yaml — 單一事實來源(SSOT),對應 d_2_schema_sync
#
# 四個消費者 import 同一份 parser,任何人不得在單一消費者私自加欄位:
#   A1  SUMMARY.md front matter 欄位定義與驗證規則
#   B1  INDEX.md entry 模板欄位 + B2 sanity check 的 schema 合規檢核
#   C4  vdb payload 欄位定義 + 寫入驗證
#   D0/D1  MCP tool 的 filter 參數 JSON schema + 錯誤訊息中的欄位清單
#
# B1 entry 與 C4 payload 的欄位語意完全等價
# = 索引導航結果與 filter 結果永遠可互相印證。
#
# 注意:這是新架構(L0–L2 圖組)的 bundle 級契約。
# 既有 pptx_to_okf pipeline 的概念級 frontmatter(cpt_*)見 ARCHITECTURE.md §3,兩者不同層。

schema_ver: v1

doc_id:
  pattern: "OKF-{year}-{serial4}"   # 例:OKF-2026-0143;A1 打包時配發
  example: OKF-2026-0143

# ---------------------------------------------------------------
# bundle 級欄位(SUMMARY.md front matter = B1 entry = C4 payload 共用)
# ---------------------------------------------------------------
fields:
  - name: doc_title
    type: string
    required: true
    source: a_0 解析(檔名或首頁標題)

  - name: doc_type
    type: enum
    required: true
    values: [SOP, 異常分析報告, 週報, 月報, 教材, 會議記錄, 規格書]   # 草案,依實際文件盤點調整
    filterable: true

  - name: date_range
    type: date_range            # {from: YYYY-MM-DD, to: YYYY-MM-DD};單日 from == to
    required: true
    filterable: true            # MCP 端拆成 date_from / date_to

  - name: process_stations
    type: array[enum]
    enum_source: vocabulary#process_station   # 合法值 = vocabulary.yaml 該 category 的 canonical
    required: true
    filterable: true

  - name: tools
    type: array[enum]
    enum_source: vocabulary#tool
    required: false
    filterable: true

  - name: defect_modes
    type: array[enum]
    enum_source: vocabulary#defect_mode
    required: false
    filterable: true

  - name: related_params
    type: array[enum]
    enum_source: vocabulary#param
    required: false
    filterable: false

  - name: source_quality
    type: enum
    values: [normal, ocr, partial]   # 掃描 OCR / 部分抽取失敗的 bundle 降級標記
    required: true
    filterable: false

# ---------------------------------------------------------------
# chunk 級欄位(僅 C4 payload;bundle 級欄位逐 chunk 冗餘展開以供 pre-filter)
# ---------------------------------------------------------------
payload_fields:
  - name: okf_id
    type: string
    required: true              # = doc_id;d_1 以此去重(vdb 存 chunk,列舉單位是文件)

  - name: chunk_id
    type: string
    required: true
    pattern: "{okf_id}_{section_id}_c{n} | {okf_id}_{figure_id}_desc | {okf_id}_{table_id}_desc"

  - name: content_kind
    type: enum
    values: [text, fig_desc, table_desc]
    required: true

  - name: section_id            # content_kind=text 時必填
    type: string
    required: conditional

  - name: figure_id             # content_kind=fig_desc 時必填
    type: string
    required: conditional

  - name: table_id              # content_kind=table_desc 時必填
    type: string
    required: conditional

  - name: linked_table          # 僅 table_desc:指向 bundle 內 raw markdown,查詢時回取精確數值
    type: string
    required: conditional

  - name: desc_quality          # 僅 VLM/LLM 描述產物
    type: enum
    values: [vlm, llm, fallback]
    required: conditional

  - name: schema_ver            # 寫入時戳記;c_4 schema 改版回填的依據
    type: string
    required: true

# ---------------------------------------------------------------
# 核心約定
# ---------------------------------------------------------------
rules:
  - 所有 enum / enum_source 欄位的值一律 canonical(A4 寫入端收斂);front matter / index / payload 三處相同。
  - vocabulary.yaml 新增術語不需改 schema(enum_source 動態引用);枚舉「結構」變更才動 schema。
  - 向後相容變更(新增選填欄位)直接發布;破壞性變更走四步:A pipeline 更新 → C 批次回填 → B2 手動全量重建 → MCP tool schema 熱更新。
  - 回填未完成期間,MCP filter 對新欄位回應標記 partial,警示結果可能不完整。
